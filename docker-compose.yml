version: '3.8'

services:

  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: devflow-postgres
    environment:
      POSTGRES_DB: devflow
      POSTGRES_USER: devflow
      POSTGRES_PASSWORD: devflow
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/setup-db.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    container_name: devflow-redis
    ports:
      - '6379:6379'

volumes:
  postgres_data:
