server:
  port: ${PORT:8083}

spring:
  application:
    name: analytics-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/devflow}
    username: ${SPRING_DATASOURCE_USERNAME:devflow}
    password: ${SPRING_DATASOURCE_PASSWORD:devflow}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    com.devflow: INFO
