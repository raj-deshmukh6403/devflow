server:
  port: 8081

spring:
  application:
    name: github-ingestion

  datasource:
    url: jdbc:postgresql://localhost:5432/devflow
    username: devflow
    password: devflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

github:
  token: YOUR_ACTUAL_REAL_TOKEN_HERE

logging:
  level:
    com.devflow: DEBUG
    org.hibernate.SQL: DEBUG