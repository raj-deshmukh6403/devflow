server:
  port: 8082

spring:
  application:
    name: scheduler-engine

  datasource:
    url: jdbc:postgresql://localhost:5432/devflow
    username: devflow
    password: devflow
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  quartz:
    job-store-type: memory

  data:
    redis:
      host: localhost
      port: 6379

logging:
  level:
    com.devflow: DEBUG